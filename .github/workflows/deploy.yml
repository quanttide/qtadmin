name: Deploy to OSS

on:
  release:
    types: [published]

env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for studio changes
        id: check
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if git rev-parse "${TAG}^" >/dev/null 2>&1; then
            if git diff --name-only "${TAG}^" "${TAG}" | grep -q "^src/studio/"; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # First commit: check if tag commit includes studio files
            if git diff-tree --no-commit-id -r "${TAG}" | grep -q "^src/studio/"; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    needs: check-changes
    if: needs.check-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        working-directory: src/studio
        run: flutter pub get

      - name: Build Web
        working-directory: src/studio
        run: flutter build web --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build
          path: src/studio/build/web
          retention-days: 3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: flutter-build
          path: build/web

      - name: Set env vars
        run: |
          echo "ALIYUN_ACCESS_KEY_ID=${{ secrets.ALIYUN_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "ALIYUN_ACCESS_KEY_SECRET=${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" >> $GITHUB_ENV

      - name: Upload to OSS
        run: |
          pip install oss2
          python scripts/upload_oss.py
