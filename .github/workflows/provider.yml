name: Provider

on:
  push:
    paths:
      - "src/provider/**"
      - ".github/workflows/provider.yml"
  pull_request:
    paths:
      - "src/provider/**"

defaults:
  run:
    working-directory: src/provider

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: src/provider/go.sum
      - run: go build ./cmd/server
      - run: go vet ./...
      - run: go test ./...
