# 案例：数据分析内训（来自教程）

来源：assets/tutorial.md

## 项目信息
- 客户：某公司（企业客户）
- 服务：中层管理者数据分析内训，为期两天
- 人员：首席顾问
- 特点：使用客户实际业务数据做案例，涉及体系设计

## 报价计算

### 工作量
- 准备：2 天（16 小时）
- 交付：2 天（16 小时）
- 回访：0.5 天（4 小时）
- 总计：36 小时

### 人员与价格
- 等级：首席
- 客户类型：企业客户
- 单价：2,000 元/小时

### 溢价判断
- 条件：涉及体系设计（企业内训体系设计）→ 满足溢价条件
- 幅度：取 30%

### 让利判断
- 单月 36 小时 > 20 小时 → 适用 8.5 折

### 审批
- 涉及溢价 → 重大报价 → 管理层审批

### 计算结果
- 基础总价：36 × 2,000 = 72,000 元
- 溢价：72,000 × 30% = 21,600 元
- 折后总价：(72,000 + 21,600) × 0.85 = 79,560 元
