[project]
name = "fastapi-quanttide-hr"
version = "0.1.0"
description = "QtCloud HR recruitment pipeline toolkit (FastAPI)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "sqlalchemy>=2.0.0",
    "pdfplumber>=0.11.0",
]

[build-system]
requires = ["setuptools>=75.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
