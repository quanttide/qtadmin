components:
  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      description: Bearer token authentication

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - code
            - message
      required:
        - error

    Employee:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        department:
          type: string
        position:
          type: string
        hire_date:
          type: string
        status:
          type: string

    Department:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        parent:
          type: string
        leader:
          type: string

    Position:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        department:
          type: string
        description:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        password_hash:
          type: string
        role_id:
          type: string
        created_at:
          type: string

    Role:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            type: string

    Notification:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        channel:
          type: string
        status:
          type: string
        target:
          type: string
        created_at:
          type: string
          format: date-time
        read_at:
          type: string
          format: date-time
          nullable: true

    NotifyRequest:
      type: object
      properties:
        channel:
          type: string
        title:
          type: string
        content:
          type: string
        target:
          type: string
      required:
        - channel
        - title
        - content
        - target

    QtConsultProject:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        stage:
          type: string
        client:
          type: string
        status:
          type: string
        created_at:
          type: string

    QtClassCourse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        teacher:
          type: string
        schedule:
          type: string
        max_students:
          type: integer
        status:
          type: string

    QtCloudResource:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        status:
          type: string
        region:
          type: string
        created_at:
          type: string

    QtDataDataset:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        status:
          type: string
        created_at:
          type: string

    QtRecuritResume:
      type: object
      properties:
        id:
          type: string
        candidate_name:
          type: string
        position:
          type: string
        stage:
          type: string
        feedback:
          type: string
        created_at:
          type: string

    QtRecuritInterview:
      type: object
      properties:
        id:
          type: string
        resume_id:
          type: string
        candidate:
          type: string
        interviewer:
          type: string
        time:
          type: string
        feedback:
          type: string
        created_at:
          type: string

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: INVALID_INPUT
              message: invalid request body
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: missing or invalid authorization header
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: resource not found
