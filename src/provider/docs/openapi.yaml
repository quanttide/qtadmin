openapi: 3.0.3
info:
  title: QuantTide Provider API
  version: 0.0.1
  description: Provider API for QuantTide platform

servers:
  - url: http://localhost:8000

paths:
  /health:
    get:
      operationId: health
      tags:
        - System
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

